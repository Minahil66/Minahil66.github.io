<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minahil khan · building the mark I</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c0c0c;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Main container - centered */
        .center-stage {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* Text content - minimal, centered */
        .text-content {
            margin-bottom: 4rem;
            position: relative;
            z-index: 20;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: #f0f0f0;
            margin-bottom: 0.5rem;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
        }

        .title-line {
            font-size: 1.2rem;
            color: #b88b4a; /* warm olive/beige */
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            font-weight: 300;
            word-spacing: 0.5rem;
        }

        .manifesto {
            font-size: 1.1rem;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
            font-weight: 300;
            border-top: 1px solid #3a3a3a;
            padding-top: 2rem;
            margin-top: 1rem;
        }

        .manifesto span {
            color: #b88b4a;
            font-style: italic;
        }

        /* Status line - subtle */
        .status {
            margin-top: 2rem;
            font-family: monospace;
            font-size: 0.85rem;
            color: #5a5a5a;
            letter-spacing: 0.1em;
        }

        .status span {
            color: #8b3a3a; /* deep red */
        }

        /* ===== HARDWARE BLUEPRINT ===== */
        /* Container for the deconstructed motherboard */
        .hardware-stage {
            position: relative;
            width: 100%;
            height: 400px;
            margin-top: 2rem;
            perspective: 1200px;
            z-index: 5;
        }

        .motherboard {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: subtleDrift 30s infinite ease-in-out;
        }

        /* Base board - the PCB */
        .pcb-base {
            position: absolute;
            width: 600px;
            height: 350px;
            background: rgba(20, 20, 20, 0.6);
            border: 2px solid #4a4a4a;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) rotateX(2deg) rotateY(1deg);
            border-radius: 8px;
            box-shadow: 0 0 0 1px #6a4a2a inset,
                        0 0 30px rgba(139, 58, 58, 0.2);
            backdrop-filter: blur(1px);
        }

        /* PCB traces (the lines) - olive/beige */
        .trace {
            position: absolute;
            background: #b88b4a;
            opacity: 0.4;
            box-shadow: 0 0 8px #b88b4a;
        }

        .trace-horizontal {
            height: 1px;
            width: 100px;
        }

        .trace-vertical {
            width: 1px;
            height: 80px;
        }

        /* Chips / Components */
        .chip {
            position: absolute;
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid #8b3a3a;
            box-shadow: 0 0 15px rgba(139, 58, 58, 0.3),
                        inset 0 0 5px #2a2a2a;
            border-radius: 3px;
        }

        .chip-large {
            width: 80px;
            height: 60px;
        }

        .chip-medium {
            width: 50px;
            height: 30px;
        }

        .chip-small {
            width: 25px;
            height: 25px;
            border-radius: 50%; /* capacitor */
        }

        /* Capacitors (olive/beige) */
        .capacitor {
            position: absolute;
            width: 12px;
            height: 24px;
            background: rgba(184, 139, 74, 0.3);
            border: 1px solid #b88b4a;
            border-radius: 6px;
            transform: rotate(5deg);
            box-shadow: 0 0 10px rgba(184, 139, 74, 0.3);
        }

        /* Wires - floating, deconstructed look */
        .wire {
            position: absolute;
            background: #8b3a3a;
            opacity: 0.3;
            box-shadow: 0 0 10px #8b3a3a;
        }

        .wire-1 {
            width: 2px;
            height: 150px;
            transform: rotate(15deg);
        }

        .wire-2 {
            width: 120px;
            height: 2px;
            transform: rotate(-5deg);
        }

        /* Screws / connectors */
        .screw {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #b88b4a;
            border-radius: 50%;
            box-shadow: 0 0 12px #b88b4a;
            opacity: 0.7;
        }

        /* Grid lines - blueprint style */
        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(184, 139, 74, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(184, 139, 74, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        /* Floating parts - deconstructed look */
        .floating-part {
            position: absolute;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            animation: floatPart 8s infinite alternate;
        }

        /* Measurements */
        .measure-line {
            position: absolute;
            border: 1px dashed #5a5a5a;
            opacity: 0.3;
        }

        /* Animations */
        @keyframes subtleDrift {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            25% { transform: rotateX(2deg) rotateY(3deg); }
            75% { transform: rotateX(-1deg) rotateY(-2deg); }
            100% { transform: rotateX(0deg) rotateY(0deg); }
        }

        @keyframes floatPart {
            0% { transform: translateY(0px) translateZ(0px); }
            100% { transform: translateY(-10px) translateZ(20px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .title-line { font-size: 0.9rem; }
            .manifesto { font-size: 0.95rem; padding: 1rem; }
            .hardware-stage { height: 300px; }
            .pcb-base { width: 450px; height: 250px; }
        }
    </style>
</head>
<body>
    <div class="center-stage">
        <!-- CENTERED TEXT -->
        <div class="text-content">
            <h1>MINAHIL KHAN</h1>
            <div class="title-line">EMERGING PEN TESTER · BUILDING THE ARSENAL</div>
            <div class="manifesto">
                First-year cybersecurity student documenting the journey from zero to operator.<br>
                <span>This is a living blueprint:</span> Every project, failure, and win gets logged here.
            </div>
            <div class="status">
                <span>⟫</span> YEAR ONE · PHASE: MARK I ASSEMBLY <span>⟫</span>
            </div>
        </div>

        <!-- HARDWARE BLUEPRINT - DECONSTRUCTED MOTHERBOARD -->
        <div class="hardware-stage">
            <div class="motherboard">
                <!-- PCB Base -->
                <div class="pcb-base"></div>

                <!-- Grid overlay (blueprint traces) -->
                <div class="grid-overlay" style="left: 50%; top: 50%; transform: translate(-50%, -50%); width: 600px; height: 350px;"></div>

                <!-- CHIPS & COMPONENTS (positioned absolutely within the motherboard) -->
                
                <!-- CPU (large chip) - red accents -->
                <div class="chip chip-large" style="left: 50%; top: 50%; transform: translate(-50%, -50%) translateZ(5px);"></div>
                
                <!-- RAM chips - olive/beige -->
                <div class="chip chip-medium" style="left: 35%; top: 40%; transform: translate(-50%, -50%) translateZ(3px); border-color: #b88b4a;"></div>
                <div class="chip chip-medium" style="left: 65%; top: 40%; transform: translate(-50%, -50%) translateZ(3px); border-color: #b88b4a;"></div>
                
                <!-- Capacitors (olive) -->
                <div class="capacitor" style="left: 30%; top: 60%;"></div>
                <div class="capacitor" style="left: 70%; top: 60%;"></div>
                <div class="capacitor" style="left: 45%; top: 70%; transform: rotate(-10deg);"></div>
                <div class="capacitor" style="left: 55%; top: 70%; transform: rotate(15deg);"></div>
                
                <!-- Small chips / ICs -->
                <div class="chip chip-small" style="left: 25%; top: 30%; background: rgba(139, 58, 58, 0.3);"></div>
                <div class="chip chip-small" style="left: 75%; top: 30%; background: rgba(139, 58, 58, 0.3);"></div>
                <div class="chip chip-small" style="left: 40%; top: 20%; border-color: #b88b4a;"></div>
                <div class="chip chip-small" style="left: 60%; top: 20%; border-color: #b88b4a;"></div>

                <!-- TRACES (the circuit paths) - olive/beige -->
                <div class="trace trace-horizontal" style="left: 30%; top: 45%; width: 150px; transform: rotate(0deg);"></div>
                <div class="trace trace-horizontal" style="left: 40%; top: 55%; width: 120px; transform: rotate(10deg); opacity: 0.3;"></div>
                <div class="trace trace-vertical" style="left: 45%; top: 30%; height: 100px;"></div>
                <div class="trace trace-vertical" style="left: 55%; top: 40%; height: 80px; opacity: 0.3;"></div>
                
                <!-- WIRES (floating, deconstructed) - red -->
                <div class="wire wire-1" style="left: 20%; top: 20%; transform: rotate(45deg);"></div>
                <div class="wire wire-2" style="left: 70%; top: 70%;"></div>
                
                <!-- SCREWS / CONNECTORS - olive/beige -->
                <div class="screw" style="left: 25%; top: 25%;"></div>
                <div class="screw" style="left: 75%; top: 25%;"></div>
                <div class="screw" style="left: 25%; top: 75%;"></div>
                <div class="screw" style="left: 75%; top: 75%;"></div>
                
                <!-- FLOATING PARTS (deconstructed effect) -->
                <div class="floating-part" style="left: 15%; top: 15%;">
                    <div class="chip chip-small" style="position: relative; border-color: #b88b4a; animation: floatPart 6s infinite alternate;"></div>
                </div>
                <div class="floating-part" style="left: 85%; top: 85%; animation-delay: -2s;">
                    <div class="capacitor" style="position: relative; transform: rotate(30deg);"></div>
                </div>
                
                <!-- Measurement lines (blueprint detail) -->
                <div class="measure-line" style="left: 20%; top: 10%; width: 60%;"></div>
                <div class="measure-line" style="left: 90%; top: 20%; height: 60%; transform: rotate(90deg);"></div>
            </div>
        </div>
    </div>
</body>
</html>
